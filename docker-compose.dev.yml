services:
  db:
    image: postgres:16
    container_name: ${APP_SLUG}_db_dev
    env_file:
      - .env.dev
      - .env.local
    ports:
     - "${DEV_DB_PORT}:5432"
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ${APP_SLUG}_backend_dev
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env.dev
      - .env.local
    volumes:
      - ./backend:/app
    ports:
      - "${DEV_API_PORT}:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ${APP_SLUG}_frontend_dev
    command: npm run dev -- --host
    env_file:
      - .env.dev
      - .env.local
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${DEV_VITE_PORT}:5173"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
